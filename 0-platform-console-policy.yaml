# =============================================================================
# Platform Policy: Vendor Console Perspective Restriction
#
# Apply this ONCE as a platform-level policy. It is NOT per-vendor.
#
# What it does:
#   Hides the OpenShift admin and developer perspectives from users who do NOT
#   have cluster-level list access on clusterrolebindings — i.e. vendor/external
#   users. Platform admins retain full visibility since they have that permission.
#
# The Console CR is a cluster singleton. It must be managed here, separately
# from per-vendor onboarding policies, to avoid policy conflicts when multiple
# vendors are onboarded.
#
# Apply with:
#   oc apply -f 0-platform-console-policy.yaml
# =============================================================================

apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-platform-console-vendor-isolation
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/description: "Restricts OCP console perspectives for non-admin (vendor) users"
spec:
  disabled: false
  remediationAction: enforce
  policy-templates:

  - objectDefinition:
      apiVersion: policy.open-cluster-management.io/v1
      kind: ConfigurationPolicy
      metadata:
        name: config-console-perspective-restriction
      spec:
        remediationAction: enforce
        severity: medium
        object-templates:
        - complianceType: musthave
          objectDefinition:
            apiVersion: operator.openshift.io/v1
            kind: Console
            metadata:
              name: cluster
            spec:
              customization:
                perspectives:
                - id: admin
                  visibility:
                    state: AccessReview
                    accessReview:
                      missing:
                      - resource: clusterrolebindings
                        verb: list
                - id: dev
                  visibility:
                    state: AccessReview
                    accessReview:
                      missing:
                      - resource: clusterrolebindings
                        verb: list

---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-platform-console
  namespace: open-cluster-management-policies
spec:
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
        - {key: local-cluster, operator: In, values: ["true"]}

---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-platform-console
  namespace: open-cluster-management-policies
placementRef:
  name: placement-platform-console
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
- name: policy-platform-console-vendor-isolation
  apiGroup: policy.open-cluster-management.io
  kind: Policy
