apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-vendor-workload
  labels:
    app: vendor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vendor-service
  template:
    metadata:
      labels:
        app: vendor-service
    spec:
      containers:
      - name: container-engine
        image: quay-server.apps.platform-customer.com/vendor/sample-app:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
