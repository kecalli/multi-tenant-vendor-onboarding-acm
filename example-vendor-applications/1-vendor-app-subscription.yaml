# =============================================================================
# Vendor Sample App — ACM Application + Subscription
#
# This is a PER-VENDOR object, rendered and applied by onboard-vendor.sh.
# All occurrences of "generic-vendor" are replaced with the vendor name.
#
# What this does:
#   - Creates an ACM Application object (shows up in ACM Applications view)
#   - Creates a Subscription that pulls the sample workload manifests from
#     the example-vendor-applications subfolder of the Git repo
#   - Deploys into the vendor's isolated namespace
#
# The vendor sees this in ACM > Applications and gets a full topology view
# showing their Deployment, Service, Route, and ConfigMap.
# =============================================================================
 
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: generic-vendor-sample-app
  namespace: generic-vendor-apps
  labels:
    tenant: generic-vendor
spec:
  componentKinds:
  - group: apps.open-cluster-management.io
    kind: Subscription
  selector:
    matchLabels:
      app: generic-vendor-sample-app
 
---
apiVersion: apps.open-cluster-management.io/v1
kind: Subscription
metadata:
  name: generic-vendor-sample-app-sub
  namespace: generic-vendor-apps
  labels:
    app: generic-vendor-sample-app
  annotations:
    apps.open-cluster-management.io/git-path: example-vendor-applications/workloads
    apps.open-cluster-management.io/git-branch: main
spec:
  channel: vendor-app-channels/vendor-approved-apps
  placement:
    local: true
  packageOverrides:
  - packageName: generic-vendor-sample-app
    packageOverrides:
    - path: spec.template.spec.containers[0].image
      value: quay.io/bitnami/nginx:latest
