apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-onboard-generic-vendor # <-- SEARCH & REPLACE HERE
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/description: "Onboard Workspace for generic-vendor" # <-- SEARCH & REPLACE HERE
spec:
  disabled: false 
  remediationAction: enforce
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: config-generic-vendor-env # <-- SEARCH & REPLACE HERE
        spec:
          remediationAction: enforce
          severity: high
          object-templates:

            # 1. GENERATE THE ISOLATED NAMESPACE
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: generic-vendor-apps # <-- SEARCH & REPLACE HERE

            # 2. ENFORCE RESTRICTED RBAC (Tied to Central IdP String Match)
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: generic-vendor-admin-binding # <-- SEARCH & REPLACE HERE
                  namespace: generic-vendor-apps # <-- SEARCH & REPLACE HERE
                subjects:
                - kind: User
                  name: generic-vendor-user # <-- SEARCH & REPLACE HERE (Maps 1:1 to SSO token string)
                  apiGroup: rbac.authorization.k8s.io
                roleRef:
                  kind: ClusterRole
                  name: admin
                  apiGroup: rbac.authorization.k8s.io

            # 3. INJECT THE REGISTRY SHORTCUT INTO THE ACM HUB APPLICATION LAUNCHER (9-DOT MENU)
            - complianceType: musthave
              objectDefinition:
                apiVersion: console.openshift.io/v1
                kind: ConsoleLink
                metadata:
                  name: generic-vendor-acm-registry-shortcut # <-- SEARCH & REPLACE HERE
                spec:
                  href: "https://quay-server.apps.platform-customer.com/generic-vendor" # <-- SEARCH & REPLACE HERE
                  text: "generic-vendor Registry" # <-- SEARCH & REPLACE HERE
                  location: ApplicationMenu 
                  applicationMenu:
                    section: Vendor Developer Tools
                    imageURL: https://raw.githubusercontent.com/quay/quay/master/static/img/quay-horizontal-color.svg

            # 4. REMOVE LOCAL OCP CLUSTER PERSPECTIVES FROM THE VENDOR VIEW
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.openshift.io/v1
                kind: Console
                metadata:
                  name: cluster
                spec:
                  customization:
                    perspectives:
                      - id: admin
                        visibility:
                          state: AccessReview
                          accessReview:
                            missing:
                              resource: clusterrolebindings
                              verb: list
                      - id: dev
                        visibility:
                          state: AccessReview
                          accessReview:
                            missing:
                              resource: clusterrolebindings
                              verb: list
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-onboard-generic-vendor # <-- SEARCH & REPLACE HERE
  namespace: open-cluster-management-policies
placementRef:
  name: placement-onboard-generic-vendor # <-- SEARCH & REPLACE HERE
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
- name: policy-onboard-generic-vendor # <-- SEARCH & REPLACE HERE
  apiGroup: policy.open-cluster-management.io
  kind: Policy
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-onboard-generic-vendor # <-- SEARCH & REPLACE HERE
  namespace: open-cluster-management-policies
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - {key: local-cluster, operator: In, values: ["true"]}
