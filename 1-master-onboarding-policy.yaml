apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-onboard-vendor-alpha # <-- Unique name for this specific instance
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/description: "Onboard Vendor Alpha Environment"
spec:
  disabled: false # <-- Turn it on so it deploys instantly
  remediationAction: enforce
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: config-vendor-alpha-env
        spec:
          remediationAction: enforce
          severity: high
          object-templates:

            # 1. GENERATE THE ISOLATED NAMESPACE
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: vendor-alpha-apps # <-- Plain text name

            # 2. ENFORCE RESTRICTED RBAC
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: vendor-admin-binding
                  namespace: vendor-alpha-apps # <-- Plain text target
                subjects:
                - kind: User
                  name: vendor-alpha-user # <-- Plain text username
                  apiGroup: rbac.authorization.k8s.io
                roleRef:
                  kind: ClusterRole
                  name: admin
                  apiGroup: rbac.authorization.k8s.io

            # 3. INJECT THE REGISTRY LINK INTO THE NAVIGATION SIDEBAR
            - complianceType: musthave
              objectDefinition:
                apiVersion: console.openshift.io/v1
                kind: ConsoleLink
                metadata:
                  name: alpha-registry-link # <-- Plain text name
                spec:
                  href: "https://quay-server.apps.platform-customer.com/vendor-alpha" # <-- Direct URL
                  location: NavigationMenu
                  text: "Vendor Alpha Registry"
                  navigationMenu:
                    section: Vendor Tools

            # 4. REMOVE LOCAL OCP CLUSTER PERSPECTIVES FROM THE VENDOR
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.openshift.io/v1
                kind: Console
                metadata:
                  name: cluster
                spec:
                  customization:
                    perspectives:
                      - id: admin
                        visibility:
                          state: AccessReview
                          accessReview:
                            missing:
                              resource: clusterrolebindings
                              verb: list
                      - id: dev
                        visibility:
                          state: AccessReview
                          accessReview:
                            missing:
                              resource: clusterrolebindings
                              verb: list
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-onboard-vendor-alpha
  namespace: open-cluster-management-policies
placementRef:
  name: placement-onboard-vendor-alpha
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
- name: policy-onboard-vendor-alpha
  apiGroup: policy.open-cluster-management.io
  kind: Policy
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-onboard-vendor-alpha
  namespace: open-cluster-management-policies
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - {key: local-cluster, operator: In, values: ["true"]}
